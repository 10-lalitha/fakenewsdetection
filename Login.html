<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeShield — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.09);
    --neon: #00e5ff;
    --neon2: #7c3aed;
    --text: #e8eaf0;
    --muted: #6b7280;
    --danger: #ff4d6d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: var(--text);
  }

  /* Animated background */
  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 600px; height: 600px; background: var(--neon); top: -200px; left: -150px; animation-delay: 0s; }
  .orb2 { width: 500px; height: 500px; background: var(--neon2); bottom: -150px; right: -100px; animation-delay: -4s; }
  .orb3 { width: 300px; height: 300px; background: #06b6d4; top: 50%; left: 55%; animation-delay: -8s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(30px, 40px) scale(1.08); }
  }

  /* Grid texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  .login-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    padding: 20px;
    animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  .brand-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--neon), var(--neon2));
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 26px;
    margin-bottom: 14px;
    box-shadow: 0 0 30px rgba(0,229,255,0.3);
  }
  .brand h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 30%, var(--neon));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .brand p {
    color: var(--muted); font-size: 14px; margin-top: 6px;
  }

  .card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 36px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(0,229,255,0.05), 0 30px 60px rgba(0,0,0,0.4);
  }

  .card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 700;
    margin-bottom: 24px;
    color: #fff;
  }

  .error-box {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--danger);
    font-size: 14px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 16px; opacity: 0.5;
  }
  .field input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input::placeholder { color: rgba(255,255,255,0.2); }
  .field input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    background: rgba(0,229,255,0.04);
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--neon), #00b4d8);
    border: none; border-radius: 12px;
    color: #050810;
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 4px 20px rgba(0,229,255,0.35);
    letter-spacing: 0.02em;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,229,255,0.5);
  }
  .btn:active { transform: translateY(0); opacity: 0.9; }

  .footer-link {
    text-align: center;
    margin-top: 22px;
    font-size: 14px;
    color: var(--muted);
  }
  .footer-link a {
    color: var(--neon);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .footer-link a:hover { opacity: 0.7; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
  }
  .divider span { flex: 1; height: 1px; background: var(--glass-border); }
  .divider p { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">🛡️</div>
    <h1>FakeShield</h1>
    <p>AI-powered misinformation detection</p>
  </div>

  <div class="card">
    <h2>Welcome back</h2>

    {% if error %}
    <div class="error-box">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" name="username" placeholder="Enter your username" required>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔑</span>
          <input type="password" name="password" placeholder="Enter your password" required>
        </div>
      </div>

      <button class="btn" type="submit">Sign In →</button>
    </form>

    <div class="footer-link" style="margin-top:18px;">
      No account? <a href="/register">Create one</a>
    </div>
  </div>
</div>

</body>
</html>
