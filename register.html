<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeShield — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.09);
    --neon: #00e5ff;
    --neon2: #7c3aed;
    --text: #e8eaf0;
    --muted: #6b7280;
    --danger: #ff4d6d;
    --success: #10b981;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; color: var(--text);
  }
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: drift 12s ease-in-out infinite alternate; }
  .orb1 { width: 550px; height: 550px; background: var(--neon2); top: -180px; right: -120px; }
  .orb2 { width: 450px; height: 450px; background: var(--neon); bottom: -120px; left: -80px; animation-delay: -5s; }
  .orb3 { width: 280px; height: 280px; background: #a855f7; top: 40%; left: 40%; animation-delay: -9s; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to { transform: translate(25px,35px) scale(1.07); }
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px; z-index: 0;
  }
  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px; padding: 20px;
    animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .brand { text-align: center; margin-bottom: 32px; }
  .brand-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--neon2), #a855f7);
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 26px; margin-bottom: 14px;
    box-shadow: 0 0 30px rgba(124,58,237,0.4);
  }
  .brand h1 {
    font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #fff 30%, #a855f7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .brand p { color: var(--muted); font-size: 14px; margin-top: 6px; }
  .card {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 24px; padding: 36px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(124,58,237,0.07), 0 30px 60px rgba(0,0,0,0.4);
  }
  .card h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #fff; }
  .card .sub { color: var(--muted); font-size: 14px; margin-bottom: 26px; }
  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .input-wrap { position: relative; }
  .input-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: 0.5; }
  .field input {
    width: 100%; padding: 13px 14px 13px 42px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    border-radius: 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input::placeholder { color: rgba(255,255,255,0.2); }
  .field input:focus {
    border-color: #a855f7;
    box-shadow: 0 0 0 3px rgba(168,85,247,0.12);
    background: rgba(168,85,247,0.05);
  }
  .strength-bar { margin-top: 8px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .strength-fill { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; border-radius: 2px; }

  .perks {
    display: flex; flex-direction: column; gap: 8px;
    background: rgba(168,85,247,0.06);
    border: 1px solid rgba(168,85,247,0.15);
    border-radius: 12px; padding: 14px 16px;
    margin-bottom: 22px;
  }
  .perk { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,0.7); }
  .perk span:first-child { font-size: 15px; }

  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none; border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    letter-spacing: 0.02em;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,0.55); }
  .btn:active { transform: translateY(0); }
  .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
  .footer-link a { color: #a855f7; text-decoration: none; font-weight: 500; }
  .footer-link a:hover { opacity: 0.75; }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="wrap">
  <div class="brand">
    <div class="brand-icon">🛡️</div>
    <h1>FakeShield</h1>
    <p>Join the fight against misinformation</p>
  </div>

  <div class="card">
    <h2>Create your account</h2>
    <p class="sub">Free forever — no credit card needed</p>

    <div class="perks">
      <div class="perk"><span>⚡</span> Instant AI-powered news analysis</div>
      <div class="perk"><span>📊</span> Full prediction history & analytics</div>
      <div class="perk"><span>🔒</span> Secure & private by default</div>
    </div>

    <form method="post">
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" name="username" placeholder="Choose a username" required>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔑</span>
          <input type="password" name="password" id="pwd" placeholder="Create a strong password" required oninput="checkStrength(this.value)">
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>

      <button class="btn" type="submit">Create Account →</button>
    </form>

    <div class="footer-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>

<script>
function checkStrength(val) {
  const fill = document.getElementById('strengthFill');
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9!@#$%]/.test(val)) score++;
  const pct = (score / 4) * 100;
  const colors = ['#ef4444','#f97316','#eab308','#10b981'];
  fill.style.width = pct + '%';
  fill.style.background = colors[score - 1] || 'transparent';
}
</script>

</body>
</html>
